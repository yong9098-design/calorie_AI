<!-- ── 인증 ── -->
<div id="screen-auth" class="screen screen-no-nav">
  <div class="auth-logo">
    <div class="logo-text">🥗 Cal AI</div>
    <div class="logo-sub">사진 한 장으로 시작하는 건강 기록</div>
  </div>
  <div class="auth-tabs">
    <div class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">로그인</div>
    <div class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">회원가입</div>
  </div>
  <div class="auth-form-wrap">
    <div id="auth-success" class="success-msg">✓ <span id="auth-success-text"></span></div>
    <div id="auth-error" class="error-msg"></div>
    <div id="login-form">
      <div class="input-group"><label>이메일</label><input type="email" id="login-email" placeholder="hello@example.com"></div>
      <div class="input-group"><label>비밀번호</label><input type="password" id="login-pw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')handleAuth('login')"></div>
      <button class="btn btn-primary" id="login-btn" onclick="handleAuth('login')">로그인</button>
    </div>
    <div id="signup-form" style="display:none">
      <div class="input-group"><label>이메일</label><input type="email" id="signup-email" placeholder="hello@example.com"></div>
      <div class="input-group"><label>비밀번호 (8자 이상)</label><input type="password" id="signup-pw" placeholder="비밀번호 입력"></div>
      <div class="input-group"><label>비밀번호 확인</label><input type="password" id="signup-pw2" placeholder="비밀번호 재입력" onkeydown="if(event.key==='Enter')handleAuth('signup')"></div>
      <button class="btn btn-primary" id="signup-btn" onclick="handleAuth('signup')">회원가입</button>
    </div>
    <div class="auth-divider"><span>또는</span></div>
    <button class="btn btn-outline" id="guest-btn" onclick="handleGuestLogin()">비회원으로 시작</button>
    <div class="warning-msg" style="margin-top:12px">비회원 로그인은 현재 브라우저 세션 기준으로 이어집니다. 로그아웃하거나 세션이 사라지면 기존 기록에 다시 접근하지 못할 수 있어요.</div>
  </div>
</div>
