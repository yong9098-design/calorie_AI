<!-- ── 홈 ── -->
<div id="screen-home" class="screen">
  <div class="top-bar"><h1>오늘 식단</h1><span class="date-text" id="home-date"></span></div>
  <div class="ring-section">
    <div class="ring-wrap">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="54" fill="none" stroke="#e5e7eb" stroke-width="14"/>
        <circle id="ring-fill" cx="80" cy="80" r="54" fill="none" stroke="#22c55e" stroke-width="14"
          stroke-dasharray="339.3" stroke-dashoffset="339.3" stroke-linecap="round" style="transition:stroke-dashoffset .6s ease"/>
      </svg>
      <div class="ring-center">
        <div class="ring-kcal" id="ring-eaten">0</div>
        <div class="ring-label">kcal 섭취</div>
      </div>
    </div>
    <div class="ring-stats">
      <div class="ring-stat"><div class="rs-val" id="stat-goal">2000</div><div class="rs-label">목표 kcal</div></div>
      <div class="ring-stat"><div class="rs-val" id="stat-remain">2000</div><div class="rs-label">남은 칼로리</div></div>
    </div>
  </div>
  <div class="macro-bars">
    <div class="macro-bar-item">
      <div class="macro-bar-top"><span class="mb-name">단백질</span><span class="mb-val" id="mb-protein-val">0g / 150g</span></div>
      <div class="bar-track"><div class="bar-fill" id="mb-protein-bar" style="width:0%"></div></div>
    </div>
    <div class="macro-bar-item">
      <div class="macro-bar-top"><span class="mb-name">탄수화물</span><span class="mb-val" id="mb-carb-val">0g / 250g</span></div>
      <div class="bar-track"><div class="bar-fill" id="mb-carb-bar" style="width:0%"></div></div>
    </div>
    <div class="macro-bar-item">
      <div class="macro-bar-top"><span class="mb-name">지방</span><span class="mb-val" id="mb-fat-val">0g / 65g</span></div>
      <div class="bar-track"><div class="bar-fill" id="mb-fat-bar" style="width:0%"></div></div>
    </div>
  </div>
  <div class="meal-section" id="home-meals-wrap">
    <div class="empty-state"><div class="empty-icon">🍽️</div><div class="empty-text">오늘 기록된 식사가 없어요</div><div class="empty-sub">아래 + 버튼으로 음식을 분석해보세요</div></div>
  </div>
</div>
