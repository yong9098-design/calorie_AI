<!-- ── 설정 ── -->
<div id="screen-settings" class="screen">
  <div class="top-bar"><h1>설정</h1></div>
  <div class="settings-section">
    <div class="settings-section-title">AI 분석 모델</div>
    <div class="model-radio-group">
      <div class="model-radio selected" id="model-flash" onclick="selectModel('flash')">⚡ Flash<br><small>빠름 · 절약</small></div>
      <div class="model-radio" id="model-pro" onclick="selectModel('pro')">🎯 Pro<br><small>정확 · 고비용</small></div>
    </div>
  </div>
  <div class="settings-section">
    <div class="settings-section-title">일일 목표</div>
    <div class="section-pad" style="padding-top:4px">
      <div class="input-row">
        <div class="input-group"><label>칼로리 (kcal)</label><input type="number" id="set-cal-goal" placeholder="2000"></div>
        <div class="input-group"><label>단백질 (g)</label><input type="number" id="set-prot-goal" placeholder="150"></div>
      </div>
      <div class="input-row">
        <div class="input-group"><label>탄수화물 (g)</label><input type="number" id="set-carb-goal" placeholder="250"></div>
        <div class="input-group"><label>지방 (g)</label><input type="number" id="set-fat-goal" placeholder="65"></div>
      </div>
      <button class="btn btn-primary" onclick="saveGoals()">목표 저장</button>
    </div>
  </div>
  <div class="settings-section" style="margin-bottom:4px">
    <div class="settings-item">
      <div><div class="si-label">프로필 재설정</div><div class="si-sub">온보딩을 다시 진행해요</div></div>
      <button class="btn btn-outline btn-sm" onclick="resetOnboarding()">재설정</button>
    </div>
    <div class="settings-item">
      <div><div class="si-label" style="color:var(--red)">로그아웃</div></div>
      <button class="btn btn-danger btn-sm" onclick="signOut()">로그아웃</button>
    </div>
  </div>
  <div style="height:12px"></div>
</div>
