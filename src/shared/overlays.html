<!-- ── FAB ── -->
<button id="fab" title="음식 분석">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>
<input type="file" id="img-input" accept="image/*" capture="environment" style="display:none">

<!-- ── 분석/수정 오버레이 ── -->
<div class="overlay" id="analysis-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">
      <span id="analysis-title">음식 분석 결과</span>
      <button class="close-btn" onclick="closeAnalysis()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div id="ai-fail-banner" class="warning-msg" style="display:none">⚠️ AI 분석에 실패했어요. 직접 입력해 주세요.</div>
    <div class="img-preview-wrap" id="preview-wrap"><div class="img-placeholder">📷</div></div>
    <div class="input-group"><label>음식명</label><input type="text" id="inp-food" placeholder="음식 이름을 입력해 주세요"></div>
    <div class="input-row">
      <div class="input-group"><label>칼로리 (kcal)</label><input type="number" id="inp-cal" placeholder="0" min="0"></div>
      <div class="input-group"><label>단백질 (g)</label><input type="number" id="inp-prot" placeholder="0" min="0"></div>
    </div>
    <div class="input-row">
      <div class="input-group"><label>탄수화물 (g)</label><input type="number" id="inp-carb" placeholder="0" min="0"></div>
      <div class="input-group"><label>지방 (g)</label><input type="number" id="inp-fat" placeholder="0" min="0"></div>
    </div>
    <div class="input-group"><label>수량 / 단위</label><input type="text" id="inp-qty" placeholder="예: 1인분, 200g"></div>
    <div class="meal-type-grid">
      <button class="mt-btn selected" onclick="selectMealType('breakfast',this)">🍳 아침</button>
      <button class="mt-btn" onclick="selectMealType('lunch',this)">🍱 점심</button>
      <button class="mt-btn" onclick="selectMealType('dinner',this)">🍽️ 저녁</button>
      <button class="mt-btn" onclick="selectMealType('snack',this)">🍪 간식</button>
    </div>
    <div id="save-err" class="error-msg"></div>
    <button class="btn btn-primary" id="save-btn" onclick="saveMeal()">저장</button>
  </div>
</div>

<!-- ── 재분석 모달 ── -->
<div class="overlay" id="reanalysis-modal">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">
      재분석 방식 선택
      <button class="close-btn" onclick="closeReanalysis()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="reanalysis-options">
      <button class="ra-option" id="ra-saved-btn" onclick="reanalyzeSaved()">
        <div class="ra-icon">🖼️</div>
        <div><div class="ra-title">저장된 이미지로 재분석</div><div class="ra-desc">기존에 업로드한 사진으로 다시 분석</div></div>
      </button>
      <button class="ra-option" onclick="reanalyzeNew()">
        <div class="ra-icon">📷</div>
        <div><div class="ra-title">새 사진으로 재분석</div><div class="ra-desc">카메라 또는 갤러리에서 새 사진 선택</div></div>
      </button>
    </div>
    <button class="btn btn-outline" onclick="closeReanalysis()">취소</button>
  </div>
</div>

<!-- ── 로딩 오버레이 ── -->
<div id="loading-overlay" style="position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:500;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px">
  <div style="width:40px;height:40px;border:3px solid #d1fae5;border-top-color:#22c55e;border-radius:50%;animation:spin .7s linear infinite"></div>
  <div id="loading-text" style="font-size:14px;color:#6b7280">분석 중...</div>
</div>
