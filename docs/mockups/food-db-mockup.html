<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="color-scheme" content="light">
<title>음식 기록 - CALO AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  color-scheme:light;
  --green:#22c55e;--green-dark:#16a34a;--green-light:#d1fae5;--green-bg:#f0fdf4;
  --bg:#f9fafb;--card:#ffffff;--text:#111827;--sub:#6b7280;
  --red:#ef4444;--border:#e5e7eb;
}
html,body{height:100%;background:#e5e7eb;font-family:'Noto Sans KR','Inter',sans-serif;color:var(--text)}
#app{width:100%;max-width:430px;min-height:100dvh;background:var(--bg);margin:0 auto;display:flex;flex-direction:column;overflow:hidden}

.top-bar{position:sticky;top:0;z-index:50;background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.top-bar h1{font-size:18px;font-weight:700}
.top-bar-btn{background:var(--green);color:#fff;border:none;border-radius:20px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s;font-family:inherit}
.top-bar-btn:hover{background:var(--green-dark)}
.top-bar-btn:disabled{background:#9ca3af;cursor:not-allowed}
.top-bar-back{background:none;border:none;color:var(--sub);font-size:20px;cursor:pointer;padding:0;margin-right:8px}

.content-wrap{flex:1;overflow-y:auto;padding:16px;padding-bottom:calc(60px + 16px)}

.search-bar{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:16px}
.search-bar svg{width:18px;height:18px;color:var(--sub)}
.search-bar input{flex:1;border:none;outline:none;font-size:15px;font-family:inherit}

.section{margin-bottom:20px}
.section-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title h2{font-size:14px;font-weight:700;color:var(--text)}
.section-clear{background:none;border:none;color:var(--sub);font-size:12px;cursor:pointer;text-decoration:underline;font-family:inherit}

.food-card{display:flex;align-items:flex-start;gap:12px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;transition:background .2s}
.food-card.selected{background:var(--green-bg);border-color:var(--green)}
.food-card input[type="checkbox"]{margin-top:4px;cursor:pointer;width:18px;height:18px;accent-color:var(--green)}
.food-info{flex:1}
.food-name-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.food-name{font-size:14px;font-weight:600;color:var(--text)}
.food-edit{background:none;border:none;color:var(--sub);font-size:12px;cursor:pointer;font-family:inherit;text-decoration:underline}
.food-qty-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.qty-btn{background:#f3f4f6;border:none;border-radius:4px;padding:4px 8px;font-size:12px;cursor:pointer;transition:background .2s;font-family:inherit}
.qty-btn:hover{background:#e5e7eb}
.qty-btn.active{background:var(--green);color:#fff}
.food-stats{display:flex;gap:12px;font-size:12px}
.stat{display:flex;align-items:center;gap:3px}
.cal-val{color:#ef4444;font-weight:600}
.protein-val{color:#3b82f6;font-weight:600}
.carb-val{color:#f59e0b;font-weight:600}
.fat-val{color:#22c55e;font-weight:600}

.empty-state{text-align:center;padding:32px 16px;color:var(--sub);font-size:14px}

.footer-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:1px solid var(--border);padding:12px 16px;z-index:100}
.footer-btn{width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:background .2s;font-family:inherit}
.footer-btn:hover:not(:disabled){background:var(--green-dark)}
.footer-btn:disabled{background:#9ca3af;cursor:not-allowed}

@media (max-width:430px){
  body{background:#f9fafb}
}
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <div style="display:flex;align-items:center">
      <button class="top-bar-back" onclick="goBack()">←</button>
      <h1>음식 기록</h1>
    </div>
    <button class="top-bar-btn" id="select-count-btn" onclick="toggleSelectAll()">+ 음식 없음</button>
  </div>

  <div class="content-wrap">
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.35-4.35"></path>
      </svg>
      <input type="text" id="search-input" placeholder="음식 검색..." onkeyup="filterFoods()">
    </div>

    <!-- 최근 음식 섹션 -->
    <div id="recent-section" class="section">
      <div class="section-title">
        <h2>⏱ 최근 음식</h2>
        <button class="section-clear" onclick="clearRecent()">최근 항목 지우기</button>
      </div>
      <div id="recent-foods"></div>
    </div>

    <!-- 인기 음식 섹션 -->
    <div id="popular-section" class="section">
      <div class="section-title">
        <h2>⭐ 인기 음식</h2>
      </div>
      <div id="popular-foods"></div>
    </div>

    <!-- API 검색 결과 -->
    <div id="search-results"></div>
  </div>

  <div class="footer-bar">
    <button class="footer-btn" id="save-btn" onclick="saveFoods()" disabled>✓ 음식 기록</button>
  </div>
</div>

<script>
const foodData = {
  recent: [
    {id:1,name:'바나나',qty:'medium',cals:{small:80,medium:114,large:160},protein:{small:0.3,medium:0.8,large:1.1},carb:{small:20,medium:26,large:37},fat:{small:0.2,medium:0.3,large:0.4}},
    {id:2,name:'밥',qty:'medium',cals:{small:150,medium:251,large:376},protein:{small:2.5,medium:5.2,large:7.8},carb:{small:33,medium:55,large:82},fat:{small:0.2,medium:0.5,large:0.7}},
    {id:3,name:'닭가슴살',qty:'medium',cals:{small:150,medium:210,large:315},protein:{small:30,medium:42,large:63},carb:{small:0,medium:0,large:0},fat:{small:2.5,medium:4.5,large:6.8}},
    {id:4,name:'고구마',qty:'medium',cals:{small:80,medium:127,large:190},protein:{small:1.5,medium:2.1,large:3.2},carb:{small:18,medium:28,large:42},fat:{small:0.1,medium:0.2,large:0.3}},
    {id:5,name:'달걀',qty:'medium',cals:{small:70,medium:155,large:232},protein:{small:6,medium:13,large:19},carb:{small:0.5,medium:1.1,large:1.6},fat:{small:5,medium:11,large:16.5}},
  ],
  popular: [
    {id:6,name:'밥',qty:'medium',cals:{small:150,medium:251,large:376},protein:{small:2.5,medium:5.2,large:7.8},carb:{small:33,medium:55,large:82},fat:{small:0.2,medium:0.5,large:0.7}},
    {id:7,name:'바나나',qty:'medium',cals:{small:80,medium:114,large:160},protein:{small:0.3,medium:0.8,large:1.1},carb:{small:20,medium:26,large:37},fat:{small:0.2,medium:0.3,large:0.4}},
    {id:8,name:'토마토',qty:'medium',cals:{small:15,medium:27,large:40},protein:{small:0.8,medium:1.3,large:2},carb:{small:3.8,medium:6,large:9},fat:{small:0.2,medium:0.3,large:0.5}},
    {id:9,name:'닭가슴살',qty:'medium',cals:{small:150,medium:210,large:315},protein:{small:30,medium:42,large:63},carb:{small:0,medium:0,large:0},fat:{small:2.5,medium:4.5,large:6.8}},
    {id:10,name:'두부',qty:'medium',cals:{small:60,medium:144,large:216},protein:{small:6.5,medium:15.7,large:23.6},carb:{small:1.8,medium:4.3,large:6.5},fat:{small:3.7,medium:8.9,large:13.3}},
    {id:11,name:'사과',qty:'medium',cals:{small:40,medium:77,large:116},protein:{small:0.2,medium:0.4,large:0.6},carb:{small:10,medium:20,large:30},fat:{small:0.2,medium:0.2,large:0.3}},
    {id:12,name:'오트밀',qty:'medium',cals:{small:80,medium:160,large:240},protein:{small:2.7,medium:5.4,large:8.1},carb:{small:13.8,medium:27.6,large:41.4},fat:{small:3.3,medium:6.5,large:9.8}},
    {id:13,name:'아몬드',qty:'medium',cals:{small:80,medium:160,large:240},protein:{small:3,medium:6,large:9},carb:{small:3,medium:6,large:9},fat:{small:14,medium:28,large:42}},
  ]
};

let selected = {};
let isLoading  = false;
let searchTimer = null;
let apiResults  = [];

function renderFoods(){
  const q            = document.getElementById('search-input').value.trim();
  const recentSec    = document.getElementById('recent-section');
  const popularSec   = document.getElementById('popular-section');
  const searchResult = document.getElementById('search-results');

  if(isLoading){
    recentSec.style.display  = 'none';
    popularSec.style.display = 'none';
    searchResult.innerHTML   = '<div style="text-align:center;padding:40px;color:var(--sub)"><div style="font-size:24px">⏳</div><p style="margin-top:8px;font-size:14px">검색 중...</p></div>';
    return;
  }
  if(q && apiResults.length > 0){
    recentSec.style.display  = 'none';
    popularSec.style.display = 'none';
    renderSection('search-results', apiResults);
    return;
  }
  if(q && apiResults.length === 0){
    recentSec.style.display  = 'none';
    popularSec.style.display = 'none';
    searchResult.innerHTML   = `<div style="text-align:center;padding:40px;color:var(--sub)"><div style="font-size:24px">🔍</div><p style="margin-top:8px;font-size:14px">'${q}' 검색 결과가 없습니다.</p></div>`;
    return;
  }
  recentSec.style.display  = '';
  popularSec.style.display = '';
  searchResult.innerHTML   = '';
  renderSection('recent-foods', foodData.recent);
  renderSection('popular-foods', foodData.popular);
}

function renderSection(id,foods){
  const container=document.getElementById(id);
  if(!foods||foods.length===0){
    container.innerHTML='<div class="empty-state">음식이 없어요</div>';
    return;
  }
  const searchVal=document.getElementById('search-input').value.toLowerCase();
  const filtered=foods.filter(f=>f.name.includes(searchVal));
  container.innerHTML=filtered.map(food=>`
    <div class="food-card ${selected[food.id]?'selected':''}">
      <input type="checkbox" onchange="toggleFood(${food.id},'${food.name}')" ${selected[food.id]?'checked':''}>
      <div style="flex:1">
        <div class="food-name-row">
          <span class="food-name">${food.name}</span>
          <button class="food-edit">✏️</button>
        </div>
        <div class="food-qty-row">
          ${['small','medium','large'].map(sz=>`
            <button class="qty-btn ${food.qty===sz?'active':''}" onclick="changeQty(${food.id},'${sz}')">${sz==='small'?'작은':'중간'} ${sz==='large'?'큰':''}</button>
          `).join('')}
        </div>
        <div class="food-stats">
          <div class="stat"><span style="color:#ef4444">🔥</span><span class="cal-val">${food.cals[food.qty]}Cal</span></div>
          <div class="stat"><span style="color:#3b82f6">💪</span><span class="protein-val">${food.protein[food.qty].toFixed(1)}g</span></div>
          <div class="stat"><span style="color:#f59e0b">🌾</span><span class="carb-val">${food.carb[food.qty].toFixed(1)}g</span></div>
          <div class="stat"><span style="color:#22c55e">🫒</span><span class="fat-val">${food.fat[food.qty].toFixed(1)}g</span></div>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleFood(id,name){
  if(selected[id]){
    delete selected[id];
  }else{
    const allFoods=[...foodData.recent,...foodData.popular,...apiResults];
    selected[id]={name,qty:allFoods.find(f=>f.id===id)?.qty||'medium'};
  }
  updateUI();
}

function changeQty(id,qty){
  const allFoods=[...foodData.recent,...foodData.popular,...apiResults];
  const food=allFoods.find(f=>f.id===id);
  if(food)food.qty=qty;
  if(selected[id])selected[id].qty=qty;
  renderFoods();
  updateUI();
}

function filterFoods(){
  const q=document.getElementById('search-input').value.trim();
  clearTimeout(searchTimer);
  if(!q){
    apiResults=[];
    renderFoods();
    return;
  }
  searchTimer=setTimeout(()=>searchFromApi(q),300);
}

async function searchFromApi(q){
  isLoading=true;
  renderFoods();
  try{
    const res=await fetch(`/api/food-search?q=${encodeURIComponent(q)}&rows=20`);
    apiResults=await res.json();
  }catch{
    apiResults=[];
  }
  isLoading=false;
  renderFoods();
}

function clearRecent(){
  foodData.recent=[];
  renderFoods();
}

function toggleSelectAll(){
  const q=document.getElementById('search-input').value.trim();
  const activeFoods=(q&&apiResults.length>0)?apiResults:[...foodData.recent,...foodData.popular];
  const allIds=activeFoods.map(f=>f.id);
  if(Object.keys(selected).length===allIds.length){
    selected={};
  }else{
    selected={};
    allIds.forEach(id=>{
      const food=activeFoods.find(f=>f.id===id);
      selected[id]={name:food.name,qty:food.qty};
    });
  }
  updateUI();
}

function updateUI(){
  const count=Object.keys(selected).length;
  const btn=document.getElementById('select-count-btn');
  btn.textContent=count===0?'+ 음식 없음':`+ ${count}개 선택`;
  document.getElementById('save-btn').disabled=count===0;
  renderFoods();
}

function saveFoods(){
  const list=Object.entries(selected).map(([id,data])=>`${data.name} (${data.qty})`).join(', ');
  alert(`선택된 음식:\n${list}\n\n실제 저장은 구현되지 않았습니다. (목업)`);
}

function goBack(){
  alert('기록 탭으로 돌아갑니다.');
  window.history.back();
}

renderFoods();
</script>
</body>
</html>
